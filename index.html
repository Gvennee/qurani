<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ისააა</title>
  <style>
    :root{
      --bg:#05050a;

      /* blob colors */
      --p1:#a855f7;
      --p2:#3b82f6;
      --p3:#ec4899;

      /* card */
      --card: rgba(255,255,255,.10);
      --card-stroke: rgba(255,255,255,.14);
      --text: #f2f3ff;

      /* slimes */
      --sand:#f4d9a6;
      --shadow: rgba(0,0,0,.08);
      --eyeWhite:#ffffff;
      --eyeStroke: rgba(0,0,0,.08);
      --pupil:#24314a;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: var(--bg);
      overflow:hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
 	touch-action: none;
    }

    /* ======= BACKGROUND BLOBS (no hard blur filter; just soft gradients) ======= */
    .bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    .blobWrap{
      position:absolute;
      inset:-25%;
      transform: translateZ(0);
      will-change: transform;
    }
    .b{
      position:absolute;
      width: 520px;
      height: 520px;
      border-radius: 999px;
      opacity:.9;
      mix-blend-mode: screen;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.22), rgba(255,255,255,0) 55%),
        radial-gradient(circle at 70% 70%, rgba(255,255,255,.10), rgba(255,255,255,0) 60%),
        linear-gradient(135deg, var(--c1), var(--c2));
      animation: floaty 10s ease-in-out infinite;
      will-change: transform;
    }
    .b1{ left: 18%; top: 22%; --c1: var(--p2); --c2: var(--p1); animation-duration: 11s; }
    .b2{ left: 48%; top: 12%; width: 620px; height: 620px; --c1: var(--p1); --c2: var(--p2); animation-duration: 13s; }
    .b3{ left: 74%; top: 38%; width: 480px; height: 480px; --c1: var(--p3); --c2: var(--p1); animation-duration: 12s; }
    .b4{ left: 34%; top: 62%; width: 460px; height: 460px; --c1: var(--p2); --c2: var(--p1); animation-duration: 9.5s; opacity:.75; }

    @keyframes floaty{
      0%,100%{ transform: translate(0,0) scale(1) rotate(0deg); }
      50%    { transform: translate(22px,-26px) scale(1.08) rotate(10deg); }
    }

    .vignette{
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(900px 520px at 50% 38%, rgba(0,0,0,0), rgba(0,0,0,.55) 72%),
        radial-gradient(1400px 900px at 50% 65%, rgba(0,0,0,0), rgba(0,0,0,.70) 85%);
    }

    /* ======= CENTER GLASS CARD ======= */
    .center{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      z-index:5;
      pointer-events:none;
    }
    .card{
      min-width: min(620px, calc(100vw - 56px));
      padding: 34px 36px;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid var(--card-stroke);
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-align:center;
    }
    .date{
      margin:0;
      font-size: clamp(44px, 7vw, 84px);
      font-weight: 800;
      letter-spacing: .03em;
      color: var(--text);
      text-shadow: 0 18px 50px rgba(0,0,0,.45);
      line-height:1.05;
    }
    .mood{
      margin: 12px 0 0;
      font-size: clamp(20px, 3vw, 34px);
      color: rgba(242,243,255,.85);
      letter-spacing: .04em;
    }

    /* ======= SLIMES STAGE (bottom) ======= */
    .stage{
      position:fixed;
      left:0; right:0;
      bottom:0;
      height: 42vh;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap: clamp(24px, 6vw, 80px);
      padding: 0 24px 48px;
      z-index:6;
      pointer-events:none; /* visuals only */
      /* sand background strip like your reference */
      background: linear-gradient(to top, var(--sand) 0 78%, rgba(244,217,166,0) 100%);
    }

    .char{
      pointer-events:none;
      position:relative;
      width: clamp(160px, 18vw, 230px);
      height: clamp(140px, 16vw, 210px);
      --tilt: 0deg;
      --px: 0px;
      --py: 0px;
      transform: translateZ(0);
    }

    .body{
      position:absolute;
      inset:0;
      border-radius: 70% 70% 55% 55% / 85% 85% 40% 40%;
      background: var(--c);
      box-shadow:
        inset 0 10px 0 rgba(255,255,255,.22),
        inset 0 -10px 0 rgba(0,0,0,.05);
      transform-origin: 50% 85%;
      transform: rotate(var(--tilt));
    }

    .mouth{
      position:absolute;
      left: 18%;
      right: 18%;
      bottom: 22%;
      height: 20%;
      border-radius: 22px;
      background: rgba(0,0,0,.06);
      transform: rotate(var(--tilt));
      transform-origin: 50% 50%;
    }
    .mouth:before{
      content:"";
      position:absolute;
      inset: 36% 18%;
      border-radius: 999px;
      background: rgba(0,0,0,.10);
    }

    .cheek{
      position:absolute;
      width: 18%;
      aspect-ratio: 1/1;
      border-radius: 999px;
      left: 42%;
      bottom: 38%;
      background: rgba(0,0,0,.06);
      transform: rotate(var(--tilt));
      display:none;
    }

    .shadow{
      position:absolute;
      left: 8%;
      right: 8%;
      bottom: -16%;
      height: 22%;
      background: radial-gradient(closest-side, var(--shadow), transparent 70%);
      filter: blur(1px);
      transform: scaleX(1.05);
    }

    .eyes{
      position:absolute;
      left: 18%;
      right: 18%;
      top: 22%;
      height: 34%;
      display:flex;
      gap: 10%;
      align-items:center;
      justify-content:center;
      transform: rotate(var(--tilt));
      transform-origin: 50% 50%;
    }

    .eye{
      width: 34%;
      height: 80%;
      background: var(--eyeWhite);
      border-radius: 999px;
      box-shadow: inset 0 0 0 2px var(--eyeStroke);
      position:relative;
      overflow:hidden;
    }
    .pupil{
      position:absolute;
      left:50%;
      top:50%;
      width: 34%;
      height: 34%;
      border-radius:999px;
      background: var(--pupil);
      transform: translate(-50%,-50%) translate(var(--px), var(--py));
      will-change: transform;
    }

    .char.small { width: clamp(150px, 16vw, 210px); height: clamp(130px, 14vw, 190px); }
    .char.big   { width: clamp(190px, 22vw, 270px); height: clamp(170px, 20vw, 250px); }

    .char.red   { --c:#ff8b92; }
    .char.blue  { --c:#8fd1ff; }
    .char.purp  { --c:#8c79ff; }

    .char.red  .body { border-radius: 75% 65% 55% 55% / 85% 80% 45% 40%; }
    .char.blue .body { border-radius: 65% 70% 55% 55% / 90% 90% 45% 45%; }
    .char.purp .body { border-radius: 70% 75% 55% 55% / 88% 82% 45% 40%; }
    .char.blue .cheek{ display:block; }

    @media (prefers-reduced-motion: reduce){
      .b{ animation:none !important; }
      .card{ backdrop-filter:none; -webkit-backdrop-filter:none; }
    }
  </style>
</head>
<body>

  <!-- blobs background -->
  <div class="bg">
    <div class="blobWrap" id="blobWrap">
      <div class="b b1"></div>
      <div class="b b2"></div>
      <div class="b b3"></div>
      <div class="b b4"></div>
    </div>
  </div>
  <div class="vignette"></div>

  <!-- center glass card -->
  <div class="center">
    <div class="card">
      <p class="date">02/28/26</p>
      <p class="mood">:/</p>
    </div>
  </div>

  <!-- slimes bottom -->
  <div class="stage">
    <div class="char red small" data-strength="10">
      <div class="body"></div>
      <div class="eyes">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
      </div>
      <div class="mouth"></div>
      <div class="shadow"></div>
    </div>

    <div class="char blue big" data-strength="12">
      <div class="body"></div>
      <div class="eyes">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
      </div>
      <div class="cheek"></div>
      <div class="mouth"></div>
      <div class="shadow"></div>
    </div>

    <div class="char purp small" data-strength="10">
      <div class="body"></div>
      <div class="eyes">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
      </div>
      <div class="mouth"></div>
      <div class="shadow"></div>
    </div>
  </div>
<script>
  // ===== shared pointer coords (mouse + touch) =====
  let mx = window.innerWidth/2, my = window.innerHeight/2;

  function setPointer(x, y){
    mx = x; my = y;
  }

  // mouse
  window.addEventListener("mousemove", (e)=>{
    setPointer(e.clientX, e.clientY);
  }, { passive:true });

  // touch (phone)
  window.addEventListener("touchstart", (e)=>{
    const t = e.touches[0];
    if(!t) return;
    setPointer(t.clientX, t.clientY);
  }, { passive:true });

  window.addEventListener("touchmove", (e)=>{
    const t = e.touches[0];
    if(!t) return;
    setPointer(t.clientX, t.clientY);
  }, { passive:true });

  // ===== blob background parallax =====
  const blobWrap = document.getElementById("blobWrap");
  let bx = mx, by = my;

  function rafBg(){
    bx += (mx - bx) * 0.03;
    by += (my - by) * 0.03;

    const dx = (bx - window.innerWidth/2) * 0.05;
    const dy = (by - window.innerHeight/2) * 0.05;

    if(blobWrap){
      blobWrap.style.transform = `translate(${dx}px, ${dy}px)`;
    }
    requestAnimationFrame(rafBg);
  }
  rafBg();

  // ===== slimes: eyes follow pointer + body tilt =====
  const chars = [...document.querySelectorAll(".char")];
  const state = new Map(chars.map(el => [el, {px:0, py:0, tilt:0}]));

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function tick(){
    for(const el of chars){
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top  + rect.height*0.42;

      const dx = mx - cx;
      const dy = my - cy;
      const angle = Math.atan2(dy, dx);
      const dist  = Math.hypot(dx, dy);

      const max = 9; // pupil px range
      const targetPX = clamp(Math.cos(angle) * max, -max, max);
      const targetPY = clamp(Math.sin(angle) * max, -max, max);

      const strength = Number(el.dataset.strength || 10);
      const tiltMax = strength; // degrees
      const proximity = clamp(1 - dist / 700, 0, 1);
      const targetTilt = clamp((Math.cos(angle) * tiltMax) * proximity, -tiltMax, tiltMax);

      const s = state.get(el);
      s.px += (targetPX - s.px) * 0.12;
      s.py += (targetPY - s.py) * 0.12;
      s.tilt += (targetTilt - s.tilt) * 0.10;

      el.style.setProperty("--px", s.px.toFixed(2) + "px");
      el.style.setProperty("--py", s.py.toFixed(2) + "px");
      el.style.setProperty("--tilt", s.tilt.toFixed(2) + "deg");
    }
    requestAnimationFrame(tick);
  }
  tick();

  window.addEventListener("resize", ()=>{
    setPointer(window.innerWidth/2, window.innerHeight/2);
    bx = mx; by = my;
  });
</script>

</body>
</html>
